name: demo-autocommit

# Re-render demo media on every push to main that touches a storyboard, then
# commit the refreshed MP4/GIF back to main. Copy this file to
# .github/workflows/ in your repo and adjust the demo paths (marked ← below).
#
# The demo output dirs must NOT be gitignored — this workflow commits them.
on:
  push:
    branches: [main]
    paths:
      - "demos/**" # ← your storyboard dir(s)
      - "!demos/**/output/**" # don't loop on our own media commits

permissions:
  contents: write # commit regenerated media back to main

concurrency:
  group: demo-autocommit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    # Don't re-trigger on the commit this job itself pushes.
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest # ships Chrome + ffmpeg; the action uses local Kokoro voice
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      # Cache the ~90 MB Kokoro model so only the first run downloads it.
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/huggingface
          key: kokoro-${{ runner.os }}-q8

      - uses: tandryukha/aidemo@stable
        with:
          demos: demos/* # ← your storyboard dir(s); globs allowed
          command: render
          tts: local
          gif: "true"

      - name: Commit regenerated media
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A demos # ← match your demo dir
          if git diff --cached --quiet; then
            echo 'no media changes'
          else
            git commit -m 'chore(demo): re-render media [skip ci]'
            git push
          fi
