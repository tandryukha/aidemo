name: demo-pr-comment

# On a pull request that touches a storyboard, re-render the affected demo and
# show it inline in a sticky PR comment. Copy to .github/workflows/ and adjust
# the paths marked ← below.
#
# SECURITY: this uses `pull_request` (NOT pull_request_target). On PRs from a
# fork the GITHUB_TOKEN is read-only, so the commit + comment steps below no-op
# (they are guarded) and reviewers pick up the render from the uploaded artifact
# instead. Never switch this to pull_request_target with a PR-head checkout —
# that would run untrusted fork code with write scope.
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "demos/**" # ← your storyboard dir(s)
      - "!demos/**/output/**"

permissions:
  contents: write # push the rendered GIF to the PR branch (same-repo PRs only)
  pull-requests: write # post/update the sticky comment

concurrency:
  group: demo-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }} # the PR branch, so we can push the GIF back
          persist-credentials: true

      # ubuntu-latest ships Chrome but not ffmpeg — the compose stage needs it.
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/huggingface
          key: kokoro-${{ runner.os }}-q8

      - uses: tandryukha/aidemo@stable
        with:
          demos: demos/* # ← your storyboard dir(s)
          command: render
          tts: local
          gif: "true"

      # Always uploaded — works even for fork PRs (read-only token).
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: demo-media
          path: demos/**/output/final-demo.*
          if-no-files-found: warn

      - name: Detect same-repo PR
        id: samerepo
        run: |
          echo "yes=${{ github.event.pull_request.head.repo.full_name == github.repository }}" >> "$GITHUB_OUTPUT"

      # Commit the GIF to the PR branch so it renders inline in the comment below.
      # Fork PRs have a read-only token, so this is skipped (the artifact is the fallback).
      - name: Commit GIF to PR branch
        if: steps.samerepo.outputs.yes == 'true'
        env:
          HEAD_REF: ${{ github.head_ref }} # via env — never interpolate into the script
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A demos # ← match your demo dir
          if git diff --cached --quiet; then
            echo 'no media changes'
          else
            git commit -m 'chore(demo): PR preview media [skip ci]'
            git push origin "HEAD:$HEAD_REF"
          fi

      - name: Sticky PR comment with the demo
        if: steps.samerepo.outputs.yes == 'true'
        uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3.0.5
        with:
          header: aidemo-preview
          message: |
            ### 🎬 Demo preview

            <!-- ← point this at your rendered demo's GIF path -->
            ![demo](https://github.com/${{ github.repository }}/raw/${{ github.head_ref }}/demos/example/output/final-demo.gif)

            Re-rendered from the committed storyboard by
            [`aidemo`](https://github.com/tandryukha/aidemo) — deterministic
            replay, local voice, zero API tokens. The MP4 is attached to this
            run as the `demo-media` artifact.

      - name: Fork PR note
        if: steps.samerepo.outputs.yes != 'true'
        run: |
          echo "::notice::Fork PR — GITHUB_TOKEN is read-only, so no inline comment was posted. Download the 'demo-media' artifact from this run to preview the demo."
