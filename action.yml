name: aidemo Demo Video
description: >-
  Re-render a narrated, captioned product-demo MP4 in CI from a committed
  storyboard. Deterministic replay, no API key, ~$0.
author: aidemo (github.com/tandryukha/aidemo)
branding:
  icon: play-circle
  color: purple

# This is a COMPOSITE action — it runs on the calling job's runner, so that
# runner must provide the engine's prerequisites:
#   * Node.js 20+ and npm on PATH (ubuntu-latest ships this; or run
#     actions/setup-node before this action for a pinned version)
#   * Google Chrome / Chromium (recorder uses `channel: "chrome"`)
#   * ffmpeg + ffprobe on PATH
# ubuntu-latest ships Chrome but NOT ffmpeg — add a step to install it before
# this action (e.g. `sudo apt-get update && sudo apt-get install -y ffmpeg`); the
# templates in examples/workflows/ show this. Network egress is github.com
# (engine), registry.npmjs.org (deps), Playwright's CDN (one-time ~2 MB ffmpeg
# recording helper) and, for tts=local, huggingface.co (one-time ~90 MB Kokoro
# model download, cacheable).

inputs:
  demos:
    description: >-
      Demo directories to (re-)render, space- or newline-separated. Shell globs
      are expanded (e.g. "demos/*"). Each dir must contain
      generated/storyboard.json.
    required: true
  command:
    description: >-
      aidemo pipeline command: render (default, full pipeline) | probe (selector
      dry-run) | record | compose | voice | captions | gif.
    required: false
    default: render
  tts:
    description: >-
      Voice backend. "local" runs Kokoro-82M in-process (no key, captions fall
      back to offline script timing); "openai" needs openai-api-key.
    required: false
    default: local
  gif:
    description: Also export output/final-demo.gif (applies to render and compose).
    required: false
    default: "false"
  headless:
    description: Run Chrome headless (required on CI runners, which have no display).
    required: false
    default: "true"
  dtype:
    description: >-
      Kokoro quantization for local TTS: q8 (default, ~90 MB) | fp32 | fp16 | q4
      | q4f16. Passed through as AIDEMO_TTS_MODEL_DTYPE.
    required: false
    default: q8
  engine-ref:
    description: >-
      Engine git ref to install from github:tandryukha/aidemo (tag, branch or
      SHA). Defaults to the moving "stable" release pointer.
    required: false
    default: stable
  engine-path:
    description: >-
      Use an already-checked-out engine at this path instead of installing from
      GitHub. Its dependencies must already be installed (e.g. `npm ci`), and for
      tts=local kokoro-js must be resolvable from it. Mainly for the engine's own
      self-test; leave empty for consumer use.
    required: false
    default: ""
  openai-api-key:
    description: >-
      OpenAI API key — only used when tts=openai. Pass it from a repository
      secret via the caller's `with:` block; never hard-code it.
    required: false
    default: ""
  working-directory:
    description: Directory to resolve the demo paths from.
    required: false
    default: "."

outputs:
  media:
    description: Newline-separated list of rendered media files (mp4/gif).
    value: ${{ steps.render.outputs.media }}
  engine-bin:
    description: Absolute path to the aidemo CLI entry the action ran.
    value: ${{ steps.engine.outputs.bin }}

runs:
  using: composite
  steps:
    - name: Resolve aidemo engine
      id: engine
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        TTS: ${{ inputs.tts }}
        ENGINE_REF: ${{ inputs.engine-ref }}
        ENGINE_PATH: ${{ inputs.engine-path }}
      run: |
        set -euo pipefail
        if [ -n "$ENGINE_PATH" ]; then
          # Dev / self-test mode: run the checked-out engine directly.
          engine_root="$(cd "$ENGINE_PATH" && pwd)"
          bin="$engine_root/bin/aidemo.mjs"
          if [ ! -f "$bin" ]; then
            echo "::error::engine-path has no bin/aidemo.mjs: $ENGINE_PATH"; exit 1
          fi
          echo "using checked-out engine at $bin"
        else
          # Consumer mode: install the engine AND (for local voice) kokoro-js into
          # one throwaway prefix. Because kokoro-js lands as a sibling of the
          # engine in the same node_modules, the engine's lazy `import("kokoro-js")`
          # resolves it — an npx-cached engine could not see a consumer-side install.
          # --ignore-scripts keeps the install script-free (kokoro-js still runs;
          # the engine drives system Chrome, so Playwright needs no browser download).
          home="${RUNNER_TEMP}/aidemo-engine"
          mkdir -p "$home"
          ( cd "$home" && npm init -y >/dev/null 2>&1 || true )
          pkgs=("github:tandryukha/aidemo#${ENGINE_REF}")
          if [ "$TTS" = "local" ]; then pkgs+=("kokoro-js"); fi
          echo "installing: ${pkgs[*]}"
          npm i --prefix "$home" --no-save --ignore-scripts --no-audit --no-fund "${pkgs[@]}"
          engine_root="$home"
          bin="$home/node_modules/aidemo/bin/aidemo.mjs"
          if [ ! -f "$bin" ]; then
            echo "::error::engine install produced no bin at $bin"; exit 1
          fi
          echo "installed engine -> $bin"
        fi

        # The recorder captures the take with Playwright's recordVideo, which
        # needs Playwright's OWN bundled ffmpeg helper (distinct from the system
        # ffmpeg the compose stage uses, and NOT a browser — the recorder drives
        # system Chrome). The script-free install skips it, so fetch just that
        # ~2 MB helper now (idempotent; from Playwright's CDN).
        pw_cli="$engine_root/node_modules/playwright/cli.js"
        if [ ! -f "$pw_cli" ]; then
          pw_cli="$(find "$engine_root" -maxdepth 5 -path '*/playwright/cli.js' 2>/dev/null | head -1)"
        fi
        if [ -n "$pw_cli" ] && [ -f "$pw_cli" ]; then
          echo "installing Playwright ffmpeg helper via $pw_cli"
          node "$pw_cli" install ffmpeg
        else
          echo "::warning::could not find playwright/cli.js under $engine_root — take recording may fail without its ffmpeg helper"
        fi

        echo "bin=$bin" >> "$GITHUB_OUTPUT"

    - name: Environment check (aidemo doctor)
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        BIN: ${{ steps.engine.outputs.bin }}
        AIDEMO_TTS_PROVIDER: ${{ inputs.tts }}
        AIDEMO_TTS_MODEL_DTYPE: ${{ inputs.dtype }}
      # Informational preflight — the render step is the hard gate.
      run: node "$BIN" doctor || true

    - name: Render demos
      id: render
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        BIN: ${{ steps.engine.outputs.bin }}
        DEMOS: ${{ inputs.demos }}
        COMMAND: ${{ inputs.command }}
        GIF: ${{ inputs.gif }}
        HEADLESS: ${{ inputs.headless }}
        AIDEMO_TTS_PROVIDER: ${{ inputs.tts }}
        AIDEMO_TTS_MODEL_DTYPE: ${{ inputs.dtype }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
      run: |
        set -euo pipefail
        shopt -s nullglob

        # Flags that apply to the chosen command (avoid `test && cmd` — it trips set -e).
        flags=()
        case "$COMMAND" in
          render)
            if [ "$HEADLESS" = "true" ]; then flags+=(--headless); fi
            if [ "$GIF" = "true" ]; then flags+=(--gif); fi
            ;;
          record|probe)
            if [ "$HEADLESS" = "true" ]; then flags+=(--headless); fi
            ;;
          compose)
            if [ "$GIF" = "true" ]; then flags+=(--gif); fi
            ;;
          voice|captions|gif)
            :
            ;;
          *)
            echo "::error::unknown command '$COMMAND' (use render|probe|record|compose|voice|captions|gif)"
            exit 1
            ;;
        esac

        media=()
        count=0
        # DEMOS is space/newline separated; unquoted expansion applies globbing.
        for pattern in $DEMOS; do
          matched=0
          for dir in $pattern; do
            if [ ! -d "$dir" ]; then continue; fi
            matched=1
            count=$((count + 1))
            echo "::group::aidemo $COMMAND $dir ${flags[*]:-}"
            node "$BIN" "$COMMAND" "$dir" "${flags[@]}"
            echo "::endgroup::"
            if [ -f "$dir/output/final-demo.mp4" ]; then media+=("$dir/output/final-demo.mp4"); fi
            if [ -f "$dir/output/final-demo.gif" ]; then media+=("$dir/output/final-demo.gif"); fi
          done
          if [ "$matched" = "0" ]; then
            echo "::warning::no demo directory matched '$pattern'"
          fi
        done
        if [ "$count" = "0" ]; then
          echo "::error::no demo directories matched input 'demos' (${DEMOS})"; exit 1
        fi

        {
          echo "media<<__AIDEMO_EOF__"
          printf '%s\n' "${media[@]:-}"
          echo "__AIDEMO_EOF__"
        } >> "$GITHUB_OUTPUT"
        echo "rendered $count demo(s)"
