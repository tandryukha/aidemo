name: Feature request
description: Propose an improvement to the engine, CLI, skill, or agent adapters.
title: "feat: <short description>"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        In scope: the engine, CLI, record-demo skill, adapters for other coding
        agents, and the planned GitHub Action. Out of scope: hosted cloud
        features (cloud browsers, credential vaults, team review UIs) — see
        [CONTRIBUTING.md](https://github.com/tandryukha/aidemo/blob/main/CONTRIBUTING.md#scope).
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that the engine makes hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How you imagine it working — CLI flag, storyboard field, new command, etc. Sketches welcome, not required.
  - type: textarea
    id: alternatives
    attributes:
      label: Workarounds / alternatives considered
  - type: checkboxes
    id: pr
    attributes:
      label: Contribution
      options:
        - label: I'm willing to open a PR for this (see CONTRIBUTING.md — DCO sign-off required)
