# Weekly npm bumps + github-actions bumps (keeps the SHA pins fresh).
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    ignore:
      # Majors (zod 4, openai 6, commander 15, ...) are deliberate migrations,
      # not auto-bumps — typecheck alone can't validate runtime behavior.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
